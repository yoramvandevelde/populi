name: Build and Push

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/yoramvandevelde/populi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # --- Frontend ---
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest

      # --- Backend ---
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}-backend:latest

      # Update the image tags in the k8s manifest so ArgoCD picks up the new version
      - name: Update image tags in kustomization
        run: |
          sed -i "s|newTag:.*# frontend|newTag: ${{ steps.meta.outputs.sha }} # frontend|" k8s/overlays/dev/kustomization.yaml
          sed -i "s|newTag:.*# backend|newTag: ${{ steps.meta.outputs.sha }} # backend|" k8s/overlays/dev/kustomization.yaml

      - name: Commit updated tags
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update image tags to ${{ steps.meta.outputs.sha }}"
          file_pattern: k8s/overlays/dev/kustomization.yaml
