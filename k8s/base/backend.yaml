apiVersion: apps/v1
kind: Deployment
metadata:
  name: populi-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: populi-backend
  template:
    metadata:
      labels:
        app: populi-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/yoramvandevelde/populi-backend
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: ASPNETCORE_URLS
              value: http://+:5000
---
apiVersion: v1
kind: Service
metadata:
  name: populi-backend-svc
spec:
  selector:
    app: populi-backend
  ports:
    - port: 5000
      targetPort: 5000
