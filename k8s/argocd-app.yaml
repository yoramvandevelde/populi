apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: populi
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yoramvandevelde/populi.git
    targetRevision: HEAD
    path: k8s/overlays/dev
  destination:
    namespace: populi
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
